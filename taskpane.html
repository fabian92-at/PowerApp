<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner Taskpane</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    #appContainer {
      position: fixed;
      inset: 0;
      background: #ffffff;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #333;
      font-size: 16px;
      z-index: 2;
      text-align: center;
      padding: 16px;
      box-sizing: border-box;
    }

    #appFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
      display: block;
    }
  </style>
</head>
<body>
  <div id="appContainer">
    <div id="loading">Canvas App wird geladen...</div>
    <iframe
      id="appFrame"
      allow="clipboard-read; clipboard-write"
      sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-modals">
    </iframe>
  </div>

  <script>
    const baseUrl =
      "https://apps.powerapps.com/play/e/03e37238-93d6-e73a-94d2-365ac9250340/a/cbeef0b5-914d-48d3-97c3-9dc29e1376cd?tenantId=1797eb83-13d8-42de-b502-001bdf9452a4&hint=fe689c85-05ae-476f-bfe1-e313f3756c00&sourcetime=1773147614812&source=iframe";

    function buildPowerAppUrl() {
      let subject = "";
      let itemId = "";
      let mailbox = "";

      try {
        if (typeof Office !== "undefined" && Office.context && Office.context.mailbox) {
          const item = Office.context.mailbox.item;
          subject = encodeURIComponent(item?.subject || "");
          itemId = encodeURIComponent(item?.itemId || "");
          mailbox = encodeURIComponent(Office.context.mailbox.userProfile?.emailAddress || "");
        }
      } catch (e) {
        console.warn("Kein Outlook-Kontext verfügbar:", e);
      }

      return (
        baseUrl +
        "&subject=" + subject +
        "&itemId=" + itemId +
        "&mailbox=" + mailbox
      );
    }

    function loadCanvasApp() {
      const frame = document.getElementById("appFrame");
      const loading = document.getElementById("loading");

      const url = buildPowerAppUrl();
      frame.src = url;

      frame.onload = function () {
        loading.style.display = "none";
      };
    }

    if (typeof Office !== "undefined") {
      Office.onReady(function () {
        loadCanvasApp();
      });
    } else {
      loadCanvasApp();
    }
  </script>
</body>
</html>
